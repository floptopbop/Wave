<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOPTOPBOP // INDEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161616;
    --surface:#262626;
    --surface-2:#1c1c1c;
    --line:#393939;
    --line-2:#525252;
    --fg:#f4f4f4;
    --fg-dim:#a8a8a8;
    --blue:#0f62fe;
    --blue-hi:#4589ff;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:var(--sans);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:0 20px 64px;
    max-width:1180px;
    margin:0 auto;
  }

  /* ---------- masthead ---------- */
  .masthead{padding:44px 0 26px;border-bottom:1px solid var(--line)}
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.18em;
    color:var(--fg-dim);
    display:flex;
    gap:14px;
    align-items:center;
    margin-bottom:22px;
  }
  .mark{
    width:34px;height:20px;flex:none;
    background:repeating-linear-gradient(to bottom,
      var(--blue) 0,var(--blue) 2px,transparent 2px,transparent 5px);
  }
  .wordmark{
    font-family:var(--sans);
    font-weight:700;
    font-size:clamp(2.5rem,13vw,5.4rem);
    line-height:.92;
    letter-spacing:-.03em;
    color:transparent;
    background:repeating-linear-gradient(to bottom,
      var(--fg) 0,var(--fg) 5px,transparent 5px,transparent 7px);
    -webkit-background-clip:text;
    background-clip:text;
  }
  .tagline{
    font-family:var(--mono);
    font-size:13px;
    color:var(--fg-dim);
    margin-top:18px;
    max-width:52ch;
  }
  .tagline b{color:var(--fg);font-weight:500}

  /* ---------- grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    margin-top:1px;
  }
  @media(min-width:680px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:1000px){.grid{grid-template-columns:1fr 1fr 1fr}}

  .card{background:var(--bg);display:flex;flex-direction:column}

  .frame{
    position:relative;
    aspect-ratio:16/10;
    background:
      linear-gradient(var(--surface-2),var(--surface-2));
    border-bottom:1px solid var(--line);
    overflow:hidden;
  }
  .frame::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:22px 22px;
    opacity:.4;
  }
  .load{
    position:absolute;inset:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;
    background:transparent;border:0;cursor:pointer;
    font-family:var(--mono);color:var(--fg-dim);
    font-size:12px;letter-spacing:.14em;
    transition:color .15s,background .15s;
  }
  .load:hover,.load:focus-visible{color:var(--fg);background:rgba(15,98,254,.06);outline:none}
  .load .play{
    width:44px;height:44px;flex:none;
    border:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:center;
    font-size:15px;color:var(--blue-hi);
    transition:border-color .15s;
  }
  .load:hover .play,.load:focus-visible .play{border-color:var(--blue)}
  .frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
  .unload{
    position:absolute;top:0;right:0;z-index:2;
    width:30px;height:30px;
    background:var(--bg);border:1px solid var(--line);border-top:0;border-right:0;
    color:var(--fg-dim);font-family:var(--mono);font-size:14px;
    cursor:pointer;display:none;align-items:center;justify-content:center;
  }
  .unload:hover{color:var(--fg);background:var(--surface)}

  .meta{padding:16px 18px 18px;display:flex;gap:14px;flex:1}
  .idx{
    font-family:var(--mono);font-size:12px;color:var(--blue-hi);
    letter-spacing:.05em;padding-top:2px;flex:none;
  }
  .body{flex:1;min-width:0}
  .name{
    font-family:var(--sans);font-weight:600;font-size:15px;
    letter-spacing:-.01em;margin-bottom:5px;
  }
  .desc{font-size:13px;color:var(--fg-dim);font-weight:400;line-height:1.45}
  .tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
  .tag{
    font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    color:var(--fg-dim);border:1px solid var(--line);padding:2px 7px;
  }
  .tag.cam{color:var(--blue-hi);border-color:var(--blue)}
  .open{
    display:flex;align-items:center;justify-content:space-between;
    font-family:var(--mono);font-size:12px;letter-spacing:.1em;
    color:var(--fg);text-decoration:none;
    padding:13px 18px;border-top:1px solid var(--line);
    transition:background .15s,color .15s;
  }
  .open:hover,.open:focus-visible{background:var(--blue);color:#fff;outline:none}
  .open .arw{transition:transform .15s}
  .open:hover .arw{transform:translate(2px,-2px)}

  /* ---------- footer ---------- */
  footer{
    margin-top:40px;padding-top:22px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:12px;color:var(--fg-dim);
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  footer b{color:var(--fg);font-weight:500}

  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

  <header class="masthead">
    <div class="eyebrow"><span class="mark"></span> INDEX / 001 — LIVE DIRECTORY</div>
    <h1 class="wordmark">FLOPTOPBOP</h1>
    <p class="tagline">Field directory of <b>on-device builds</b> — generative filters, voxel worlds, and ASCII simulations. Everything runs in the browser. Tap a frame to run it in place.</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    <span>NCTTS — <b>07</b> live builds</span>
    <span>github.io // built on phone</span>
  </footer>

<script>
  const PROJECTS = [
    { id:"Voxel", name:"PANDRA_OS // MONUMENT",
      desc:"Voxel monument explorer — grapple, jetpack & walk traversal across monument-scale architecture.",
      tags:["THREE.JS","3D"] },
    { id:"scanderlydarklied", name:"TRINITY ENGINE",
      desc:"Live camera suite: Monklin warp × Razor edge × Bayer dither, freeze-frame capture.",
      tags:["WEBGL","CAM"] },
    { id:"Wavy", name:"SUMI-E DAEMON",
      desc:"Ink-wash camera filter — ghost wash, mid bloom & black strokes with a draggable hanko seal.",
      tags:["CANVAS","CAM"] },
    { id:"OHhHHh_fishyfishyfishyfis", name:"VOLUMETRIC NANO SWARM",
      desc:"TrueColor volumetric particle swarm — dense agent flocking rendered in real time.",
      tags:["WEBGL","3D"] },
    { id:"nonenage", name:"PANDRA_OS // SHARD RECON",
      desc:"Dual-scanline edge & skeleton extraction with commit-to-stack layering.",
      tags:["CANVAS","TOOL"] },
    { id:"Beach-day", name:"ASCII OCEAN",
      desc:"Finite-difference wave sim with shoreline wash-up and a wandering bear.",
      tags:["ASCII","SIM"] },
    { id:"Water", name:"ASCII WATER",
      desc:"Character-cell fluid study — wave buffer rendered in pure text.",
      tags:["ASCII","SIM"] },
  ];
  const BASE = "https://floptopbop.github.io/";
  const ALLOW = "camera;microphone;gyroscope;accelerometer;fullscreen;xr-spatial-tracking;autoplay";

  const grid = document.getElementById("grid");
  PROJECTS.forEach((p,i)=>{
    const url = BASE + p.id + "/";
    const num = String(i+1).padStart(2,"0");
    const tags = p.tags.map(t=>{
      const cam = t==="CAM";
      return `<span class="tag${cam?" cam":""}">${cam?"◉ CAM":t}</span>`;
    }).join("");
    const el = document.createElement("article");
    el.className = "card";
    el.innerHTML = `
      <div class="frame" data-src="${url}">
        <button class="unload" title="Stop preview">✕</button>
        <button class="load">
          <span class="play">▶</span>
          RUN PREVIEW
        </button>
      </div>
      <div class="meta">
        <span class="idx">${num}</span>
        <div class="body">
          <div class="name">${p.name}</div>
          <div class="desc">${p.desc}</div>
          <div class="tags">${tags}</div>
        </div>
      </div>
      <a class="open" href="${url}" target="_blank" rel="noopener">
        OPEN FULLSCREEN <span class="arw">↗</span>
      </a>`;
    grid.appendChild(el);

    const frame = el.querySelector(".frame");
    const loadBtn = el.querySelector(".load");
    const unloadBtn = el.querySelector(".unload");

    loadBtn.addEventListener("click",()=>{
      const iframe = document.createElement("iframe");
      iframe.setAttribute("allow",ALLOW);
      iframe.setAttribute("loading","lazy");
      iframe.src = frame.dataset.src;
      frame.appendChild(iframe);
      loadBtn.style.display="none";
      unloadBtn.style.display="flex";
    });
    unloadBtn.addEventListener("click",()=>{
      const iframe = frame.querySelector("iframe");
      if(iframe) iframe.remove();          // releases camera / stops sim
      loadBtn.style.display="flex";
      unloadBtn.style.display="none";
    });
  });
</script>
</body>
</html>
